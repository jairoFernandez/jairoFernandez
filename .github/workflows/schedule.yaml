name: "Update READMEs contents"

on:
  schedule:
    - cron: "0 */4 * * *" # every 4 hours
  workflow_dispatch:

permissions:
  contents: write

env:
  VERSION: "0.1.23"

jobs:
  update-readme:
    name: "Update README"
    runs-on: ubuntu-latest
    steps:

      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: Install application to render the template
        uses: supplypike/setup-bin@v4
        with:
          uri: "https://github.com/patrickdappollonio/patrickdappollonio/releases/download/v${{ env.VERSION }}/patrickdappollonio_linux_x86_64.tar.gz"
          name: "patrickdappollonio"
          version: "${{ env.VERSION }}"

      - name: Configure timezone
        uses: zcong1993/setup-timezone@master
        with:
          timezone: "America/New_York"

      - name: Update README with latest information
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="${GITHUB_REF_NAME}"
          MAX_ATTEMPTS=3

          for ATTEMPT in $(seq 1 "${MAX_ATTEMPTS}"); do
            git fetch origin "${BRANCH}"
            git reset --hard "origin/${BRANCH}"

            patrickdappollonio > README.md
            git add README.md

            if git diff --cached --quiet; then
              echo "No changes to commit"
              exit 0
            fi

            git commit -m "[ci skip] Updating README with latest information"

            if git push origin "HEAD:${BRANCH}"; then
              exit 0
            fi

            echo "Push rejected, retrying (attempt ${ATTEMPT} of ${MAX_ATTEMPTS})..."
            sleep $((5 * (2 ** (ATTEMPT - 1))))
          done

          echo "Failed to push README update after ${MAX_ATTEMPTS} attempts."
          exit 1
        env:
          RSS_FEED: "https://dev.to/feed/jairofernandez"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISABLE_RSS: "false"
          GITHUB_USERNAME: "jairoFernandez"
          MAX_ARTICLES: "20"
